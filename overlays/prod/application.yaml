apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: java-app
  namespace: argocd
spec:
  destination:
    namespace: prod
    server: https://kubernetes.default.svc
  source:
    repoURL: https://github.com/Perumal05/ArgoCD.git
    targetRevision: main
    path: overlays/prod
  project: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true