apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: db-secret
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: app-secret
  data:
  - secretKey: DB_PASSWORD
    remoteRef:
      key: java-app # This path has to exact same from your Vault
      property: password # This variable also should same as the vault variable